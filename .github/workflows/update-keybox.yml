name: Update keybox

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

jobs:
  update-spoofing:
    name: Sync keybox from EvolutionX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download keybox
        run: |
          mkdir -p profile
          curl -fsSL "https://git.evolution-x.org/EvoX/keybox/raw/branch/main/keybox.xml" -o profile/keybox.xml

      - name: Commit updated keybox
        run: |
          if [ -z "$(git status --porcelain -- profile/keybox.xml)" ]; then
            echo "Keybox is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/keybox.xml
          git commit -m "Update keybox from EvolutionX"
          git push
